<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Mobile Pro</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --cell-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Chặn cuộn trang khi vuốt chơi game */
        }

        .header { width: 90vw; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-container { background: #bbada0; padding: 10px 20px; border-radius: 6px; color: white; text-align: center; }
        .score-label { display: block; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        #score { font-size: 20px; font-weight: bold; }

        #game-container {
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            background-color: var(--bg-color);
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .cell {
            background-color: var(--cell-bg);
            border-radius: 3px;
            width: 100%;
            height: 100%;
        }

        .tile {
            position: absolute;
            width: calc((100% - 50px) / 4);
            height: calc((100% - 50px) / 4);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            transition: all 0.1s ease-in-out;
            z-index: 2;
        }

        /* Màu sắc các con số */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: var(--text-light); }
        .tile-16 { background: #f59563; color: var(--text-light); }
        .tile-32 { background: #f67c5f; color: var(--text-light); }
        .tile-64 { background: #f65e3b; color: var(--text-light); }
        .tile-128 { background: #edcf72; color: var(--text-light); font-size: 18px; }
        .tile-256 { background: #edcc61; color: var(--text-light); font-size: 18px; }
        .tile-512 { background: #edc850; color: var(--text-light); font-size: 18px; }
        .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 15px; }
        .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 15px; }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            background: #8f7a66;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: #776e65; margin: 0;">2048</h1>
    <div class="score-container">
        <span class="score-label">Điểm</span>
        <div id="score">0</div>
    </div>
</div>

<div id="game-container">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>

<button class="btn-reset" onclick="initGame()">Chơi lại</button>

<script>
    let board = [];
    let score = 0;
    const size = 4;
    const container = document.getElementById('game-container');
    const scoreDisplay = document.getElementById('score');

    // Khởi tạo game
    function initGame() {
        board = Array(size).fill().map(() => Array(size).fill(0));
        score = 0;
        updateScore(0);
        addTile();
        addTile();
        render();
    }

    function addTile() {
        let emptyCells = [];
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                if (board[r][c] === 0) emptyCells.push({r, c});
            }
        }
        if (emptyCells.length > 0) {
            let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function render() {
        // Xóa các tile cũ (nhưng giữ lại 16 ô nền)
        const oldTiles = document.querySelectorAll('.tile');
        oldTiles.forEach(t => t.remove());

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                if (board[r][c] !== 0) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${board[r][c]}`;
                    tile.textContent = board[r][c];
                    // Tính toán vị trí tuyệt đối dựa trên lưới
                    tile.style.top = `calc(${r} * 25% + 10px)`;
                    tile.style.left = `calc(${c} * 25% + 10px)`;
                    container.appendChild(tile);
                }
            }
        }
    }

    function updateScore(points) {
        score += points;
        scoreDisplay.textContent = score;
    }

    // Logic di chuyển
    function slide(row) {
        let arr = row.filter(val => val !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i+1]) {
                arr[i] *= 2;
                updateScore(arr[i]);
                arr[i+1] = 0;
            }
        }
        arr = arr.filter(val => val !== 0);
        while (arr.length < size) arr.push(0);
        return arr;
    }

    function move(direction) {
        let oldBoard = JSON.stringify(board);
        if (direction === 'left' || direction === 'right') {
            for (let r = 0; r < size; r++) {
                let row = board[r];
                if (direction === 'right') row.reverse();
                let newRow = slide(row);
                if (direction === 'right') newRow.reverse();
                board[r] = newRow;
            }
        } else {
            for (let c = 0; c < size; c++) {
                let column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                if (direction === 'down') column.reverse();
                let newCol = slide(column);
                if (direction === 'down') newCol.reverse();
                for (let r = 0; r < size; r++) board[r][c] = newCol[r];
            }
        }

        if (oldBoard !== JSON.stringify(board)) {
            addTile();
            render();
            checkGameOver();
        }
    }

    function checkGameOver() {
        // Kiểm tra xem còn ô trống không hoặc còn nước ghép không
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                if (board[r][c] === 0) return;
                if (c < size - 1 && board[r][c] === board[r][c+1]) return;
                if (r < size - 1 && board[r][c] === board[r+1][c]) return;
            }
        }
        alert("Game Over! Điểm của bạn: " + score);
    }

    // Điều khiển bàn phím
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') move('up');
        if (e.key === 'ArrowDown') move('down');
        if (e.key === 'ArrowLeft') move('left');
        if (e.key === 'ArrowRight') move('right');
    });

    // Điều khiển Vuốt (Swipe) cho Mobile
    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, false);

    window.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;
        
        let dx = touchEndX - touchStartX;
        let dy = touchEndY - touchStartY;

        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
        } else {
            if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
        }
    }, false);

    initGame();
</script>
</body>
</html>
