<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Master - Ghi Danh Anh Hùng</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --cell-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            font-family: "Clear Sans", Arial, sans-serif;
            background-color: #faf8ef;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Màn hình nhập tên */
        #setup-screen {
            position: fixed; inset: 0; background: rgba(250, 248, 239, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 20px;
        }

        .input-group { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { padding: 12px; font-size: 18px; border: 2px solid #bbada0; border-radius: 5px; width: 200px; outline: none; }
        
        /* Giao diện Game */
        .header { width: 90vw; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px; }
        .score-box { background: #bbada0; padding: 5px 15px; border-radius: 6px; color: white; text-align: center; min-width: 80px; }
        
        .instructions { 
            width: 90vw; max-width: 400px; background: #eee4da; padding: 10px; 
            border-radius: 6px; font-size: 14px; color: #776e65; margin: 10px 0;
            line-height: 1.4;
        }

        #game-container {
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            background-color: var(--bg-color); border-radius: 6px;
            position: relative; padding: 10px; box-sizing: border-box;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }

        .cell { background-color: var(--cell-bg); border-radius: 3px; width: 100%; height: 100%; }

        .tile {
            position: absolute; width: calc((100% - 50px) / 4); height: calc((100% - 50px) / 4);
            border-radius: 3px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; transition: all 0.1s ease-in-out; z-index: 2;
        }

        /* Màu tile (Giữ nguyên từ bản trước) */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: var(--text-light); }
        .tile-16 { background: #f59563; color: var(--text-light); }
        .tile-32 { background: #f67c5f; color: var(--text-light); }
        .tile-64 { background: #f65e3b; color: var(--text-light); }
        .tile-128 { background: #edcf72; color: var(--text-light); font-size: 20px; }
        .tile-256 { background: #edcc61; color: var(--text-light); font-size: 20px; }
        .tile-512 { background: #edc850; color: var(--text-light); font-size: 20px; }
        .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 16px; }
        .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 16px; }

        .btn {
            background: #8f7a66; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="input-group">
        <h1 style="color: #776e65; margin-top:0;">2048 MASTER</h1>
        <p style="color: #776e65;">Nhập tên anh hùng của bạn:</p>
        <input type="text" id="playerName" placeholder="Tên của bạn..." maxlength="12">
        <br>
        <button class="btn" onclick="startGame()">BẮT ĐẦU</button>
    </div>
</div>

<div class="header">
    <div>
        <h2 style="color: #776e65; margin: 0;">2048</h2>
        <small id="helloName" style="color: #776e65;"></small>
    </div>
    <div class="score-box">
        <div style="font-size: 12px; text-transform: uppercase;">Điểm số</div>
        <div id="score" style="font-size: 20px; font-weight: bold;">0</div>
    </div>
</div>

<div class="instructions">
    <b>Cách chơi:</b> <br>
    - <b>Máy tính:</b> Dùng 4 phím mũi tên để di chuyển các ô số. <br>
    - <b>Điện thoại:</b> Vuốt (Lên, Xuống, Trái, Phải) để di chuyển. <br>
    - 2 ô cùng số chạm nhau sẽ cộng dồn. Đạt đến <b>2048</b> để thắng!
</div>

<div id="game-container">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>

<button class="btn" onclick="location.reload()">Đổi người chơi</button>

<script>
    let board = [];
    let score = 0;
    let playerName = "";
    const size = 4;
    const container = document.getElementById('game-container');

    function startGame() {
        const nameInput = document.getElementById('playerName').value.trim();
        playerName = nameInput || "Vô danh";
        document.getElementById('helloName').textContent = "Chào, " + playerName + "!";
        document.getElementById('setup-screen').style.display = "none";
        initGame();
    }

    function initGame() {
        board = Array(size).fill().map(() => Array(size).fill(0));
        score = 0;
        document.getElementById('score').textContent = "0";
        addTile(); addTile();
        render();
    }

    function addTile() {
        let empty = [];
        for(let r=0; r<size; r++) for(let c=0; c<size; c++) if(board[r][c]===0) empty.push({r,c});
        if (empty.length > 0) {
            let {r, c} = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function render() {
        document.querySelectorAll('.tile').forEach(t => t.remove());
        for (let r=0; r<size; r++) {
            for (let c=0; c<size; c++) {
                if (board[r][c] !== 0) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${board[r][c]}`;
                    tile.textContent = board[r][c];
                    tile.style.top = `calc(${r} * 25% + 10px)`;
                    tile.style.left = `calc(${c} * 25% + 10px)`;
                    container.appendChild(tile);
                }
            }
        }
    }

    function move(dir) {
        let oldBoard = JSON.stringify(board);
        if (dir === 'left' || dir === 'right') {
            for (let r=0; r<size; r++) {
                let row = board[r];
                if (dir === 'right') row.reverse();
                let newRow = slide(row);
                if (dir === 'right') newRow.reverse();
                board[r] = newRow;
            }
        } else {
            for (let c=0; c<size; c++) {
                let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                if (dir === 'down') col.reverse();
                let newCol = slide(col);
                if (dir === 'down') newCol.reverse();
                for (let r=0; r<size; r++) board[r][c] = newCol[r];
            }
        }
        if (oldBoard !== JSON.stringify(board)) {
            addTile(); render(); checkOver();
        }
    }

    function slide(row) {
        let arr = row.filter(v => v !== 0);
        for (let i=0; i<arr.length-1; i++) {
            if (arr[i] === arr[i+1]) {
                arr[i] *= 2;
                score += arr[i];
                document.getElementById('score').textContent = score;
                arr[i+1] = 0;
            }
        }
        arr = arr.filter(v => v !== 0);
        while (arr.length < size) arr.push(0);
        return arr;
    }

    function checkOver() {
        let canMove = false;
        for(let r=0; r<size; r++) {
            for(let c=0; c<size; c++) {
                if(board[r][c]===0) canMove = true;
                if(c<size-1 && board[r][c]===board[r][c+1]) canMove = true;
                if(r<size-1 && board[r][c]===board[r+1][c]) canMove = true;
                if(board[r][c] === 2048) { alert("Chúc mừng " + playerName + " đã đạt 2048!"); return; }
            }
        }
        if(!canMove) alert("Hết nước rồi " + playerName + "! Điểm của bạn: " + score);
    }

    // PC: Phím mũi tên (Chặn cuộn trang)
    window.addEventListener('keydown', e => {
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
            e.preventDefault();
            move(e.key.replace("Arrow","").toLowerCase());
        }
    });

    // Mobile: Vuốt
    let tsX, tsY;
    window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, false);
    window.addEventListener('touchend', e => {
        let dx = e.changedTouches[0].clientX - tsX;
        let dy = e.changedTouches[0].clientY - tsY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
        } else {
            if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
        }
    }, false);

</script>
</body>
</html>
